services:
  forge:
    build: .
    container_name: bareignite-forge
    ports:
      - "${FORGE_PORT:-8000}:8000"
    volumes:
      - ./cache:/app/cache
      - ./output:/app/output
      - ./data:/app/data
    environment:
      - FORGE_CACHE_DIR=/app/cache
      - FORGE_OUTPUT_DIR=/app/output
    restart: unless-stopped
