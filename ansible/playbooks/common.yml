---
# common.yml -- Common post-install tasks applied to all servers
#
# Waits for servers to become reachable, gathers facts, then applies
# base configuration: hostname, hosts file, timezone, packages, users, NTP.

- name: Common baseline configuration
  hosts: all
  gather_facts: false
  tags:
    - common

  pre_tasks:
    - name: Wait for server to be reachable via SSH
      wait_for_connection:
        delay: 5
        timeout: 300
      tags:
        - always

    - name: Gather facts after connection is established
      setup:
      tags:
        - always

  roles:
    - role: base
      tags:
        - base
    - role: users
      tags:
        - users
    - role: ntp
      tags:
        - ntp
