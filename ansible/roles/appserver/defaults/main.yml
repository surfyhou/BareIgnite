---
# appserver/defaults/main.yml -- Default variables for the appserver role

# Base packages for app servers (RedHat)
appserver_base_packages_rhel:
  - gcc
  - gcc-c++
  - make
  - openssl
  - openssl-devel
  - zlib-devel
  - bzip2
  - bzip2-devel
  - readline-devel
  - sqlite
  - sqlite-devel
  - libffi-devel

# Base packages for app servers (Debian)
appserver_base_packages_debian:
  - build-essential
  - libssl-dev
  - zlib1g-dev
  - libbz2-dev
  - libreadline-dev
  - libsqlite3-dev
  - libffi-dev

# Whether to install Java runtime
appserver_install_java: false

# Java package names
appserver_java_package_rhel: "java-11-openjdk-devel"
appserver_java_package_debian: "openjdk-11-jdk"

# Whether to install Python runtime
appserver_install_python: false

# Python package names
appserver_python_packages_rhel:
  - python3
  - python3-pip
  - python3-devel
appserver_python_packages_debian:
  - python3
  - python3-pip
  - python3-dev
  - python3-venv

# Application user/group
appserver_create_app_user: true
appserver_app_user: "appuser"
appserver_app_group: "appuser"
appserver_app_home: "/home/appuser"

# Application directories to create
appserver_app_dirs:
  - path: /opt/app
    mode: "0755"
  - path: /opt/app/bin
    mode: "0755"
  - path: /opt/app/conf
    mode: "0750"
  - path: /opt/app/logs
    mode: "0755"
  - path: /opt/app/data
    mode: "0750"

# ulimit values for application user
appserver_ulimit_nofile: "65536"
appserver_ulimit_nproc: "32768"

# Kernel parameters for app servers
appserver_sysctl_params:
  net.core.somaxconn: "4096"
  net.core.netdev_max_backlog: "5000"
  net.ipv4.tcp_max_syn_backlog: "4096"
  net.ipv4.tcp_fin_timeout: "15"
  net.ipv4.ip_local_port_range: "10000 65535"
  net.ipv4.tcp_tw_reuse: "1"
  vm.swappiness: "10"
