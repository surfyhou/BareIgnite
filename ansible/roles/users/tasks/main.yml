---
# users/tasks/main.yml -- User management
#
# Creates admin users, deploys SSH keys, configures sudo access,
# and sets password policies.

# --- Admin user creation ---

- name: Create admin group
  group:
    name: "{{ users_admin_group }}"
    state: present

- name: Create admin users
  user:
    name: "{{ item.name }}"
    comment: "{{ item.comment | default(item.name + ' - BareIgnite managed') }}"
    groups: "{{ item.groups | default([users_admin_group]) | join(',') }}"
    append: true
    shell: "{{ item.shell | default('/bin/bash') }}"
    create_home: true
    state: present
  loop: "{{ users_admin_list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Set user passwords (if specified)
  user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    update_password: on_create
  loop: "{{ users_admin_list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.password is defined
  no_log: true

# --- SSH key deployment ---

- name: Deploy SSH authorized keys for admin users
  authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: "{{ users_ssh_key_exclusive | bool }}"
  loop: "{{ users_admin_list | subelements('ssh_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"

- name: Deploy SSH authorized keys for root
  authorized_key:
    user: root
    key: "{{ item }}"
    state: present
  loop: "{{ users_root_ssh_keys }}"
  when: users_root_ssh_keys | length > 0

# --- Sudo configuration ---

- name: Configure passwordless sudo for admin group
  copy:
    content: |
      # BareIgnite managed -- admin group sudo access
      %{{ users_admin_group }} ALL=(ALL) {{ 'NOPASSWD: ' if users_sudo_nopasswd else '' }}ALL
    dest: "/etc/sudoers.d/{{ users_admin_group }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

# --- Password policies ---

- name: Configure password aging policy
  template:
    src: login.defs.j2
    dest: /etc/login.defs
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: users_manage_password_policy | bool

- name: Set password aging for existing admin users
  command: >
    chage
    --mindays {{ users_password_min_days }}
    --maxdays {{ users_password_max_days }}
    --warndays {{ users_password_warn_days }}
    {{ item.name }}
  loop: "{{ users_admin_list }}"
  loop_control:
    label: "{{ item.name }}"
  when: users_manage_password_policy | bool
  changed_when: true
