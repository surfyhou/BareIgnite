# bareignite.conf - Default configuration for BareIgnite
#
# This file is sourced by BareIgnite scripts. Override values by setting the
# corresponding environment variable before running a command.
#
# Lines starting with '#' are comments. Empty values fall back to defaults.

# ---------------------------------------------------------------------------
# Control node network
# ---------------------------------------------------------------------------
# IP address of the control node (auto-detected from IPMI_INTERFACE if empty)
CONTROL_IP=""

# Network interface connected to the IPMI / provisioning network
IPMI_INTERFACE="eth0"

# ---------------------------------------------------------------------------
# DHCP / PXE
# ---------------------------------------------------------------------------
# DHCP lease time (dnsmasq format)
DHCP_LEASE_TIME="1h"

# TFTP root directory (served by dnsmasq)
TFTP_ROOT="${BAREIGNITE_ROOT:-}/pxe"

# ---------------------------------------------------------------------------
# HTTP service (nginx)
# ---------------------------------------------------------------------------
# Document root for the HTTP server (kickstarts, images, etc.)
HTTP_ROOT="${BAREIGNITE_ROOT:-}"

# HTTP listen port
HTTP_PORT="8080"

# ---------------------------------------------------------------------------
# Samba (Windows deployment)
# ---------------------------------------------------------------------------
# Share path for Windows PE / drivers
SMB_SHARE_PATH="${BAREIGNITE_ROOT:-}/images/windows"

# ---------------------------------------------------------------------------
# Callback service
# ---------------------------------------------------------------------------
# TCP port where socat listens for post-install callbacks
CALLBACK_PORT="8888"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# Log level: debug, info, warn, error
LOG_LEVEL="info"

# ---------------------------------------------------------------------------
# Image / PXE / tool paths
# ---------------------------------------------------------------------------
# Directory containing OS ISO images
IMAGES_DIR="${BAREIGNITE_ROOT:-}/images"

# Directory containing PXE boot files (pxelinux, shim, grub)
PXE_DIR="${BAREIGNITE_ROOT:-}/pxe"

# Directory for helper tools / binaries
TOOLS_DIR="${BAREIGNITE_ROOT:-}/tools"
